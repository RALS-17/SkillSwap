<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Background gradient: brand dark -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </linearGradient>
    <!-- Icon gradient: violet → pink -->
    <linearGradient id="icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="50%"  stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="16" ry="16" fill="url(#bg)"/>

  <!-- Subtle inner border highlight -->
  <rect width="64" height="64" rx="16" ry="16"
        fill="none" stroke="rgba(167,139,250,0.25)" stroke-width="1.5"/>

  <!-- Lightning bolt / swap icon — two overlapping arrows forming a ⚡ swap shape -->
  <!-- Main zap bolt: centred at 32,32 -->
  <g filter="url(#glow)">
    <path
      d="M36 10 L22 34 H31 L28 54 L42 30 H33 Z"
      fill="url(#icon)"
      stroke="none"
    />
  </g>
</svg>
